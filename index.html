<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>社内管理プラットフォーム</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
/* ═══ RESET & BASE ═══ */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f9fafb;min-height:100vh;}

/* ═══ PORTAL (Home screen) ═══ */
#portal{display:flex;flex-direction:column;min-height:100vh;}
.portal-header{padding:28px 24px 0;max-width:760px;width:100%;margin:0 auto;}
.portal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;padding:24px;max-width:760px;width:100%;margin:0 auto;}
.app-card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:24px 16px 18px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;transition:all .15s;text-align:center;-webkit-tap-highlight-color:transparent;}
.app-card:hover{border-color:#c4b5fd;background:#faf5ff;transform:translateY(-1px);}
.app-card:active{transform:translateY(0);}
.app-icon{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;}
.app-icon svg{width:28px;height:28px;}
.app-name{font-size:13px;font-weight:600;color:#111827;line-height:1.3;}
.app-desc{font-size:11px;color:#6b7280;line-height:1.4;}
.app-badge{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:600;}

/* ═══ APP SHELL (inside each app) ═══ */
#app-shell{display:none;flex-direction:column;height:100vh;}
.app-topbar{height:52px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:50;}
.app-topbar-back{width:34px;height:34px;border-radius:8px;border:1px solid #e5e7eb;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
.app-topbar-back svg{width:18px;height:18px;color:#374151;}
.app-topbar-title{font-size:15px;font-weight:600;color:#111827;flex:1;}
.app-topbar-user{font-size:12px;color:#9ca3af;}

.app-content{flex:1;overflow-y:auto;position:relative;}

/* Desktop sidebar (inside app) */
.app-sidebar{width:210px;flex-shrink:0;height:100%;overflow-y:auto;border-right:1px solid #e5e7eb;background:#fff;display:flex;flex-direction:column;}
.app-main{flex:1;overflow-y:auto;}
.app-layout{display:flex;height:100%;}

@media(max-width:640px){
  .app-sidebar{display:none!important;}
  .app-layout{display:block;}
  .app-main{height:calc(100vh - 52px - 60px);overflow-y:auto;}
  #mobile-nav{display:flex!important;}
  .page{padding:14px!important;}
}

/* Mobile bottom nav (shared) */
#mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:60px;background:#fff;border-top:1px solid #e5e7eb;z-index:100;align-items:stretch;}
.mnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px;color:#9ca3af;border:none;background:none;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:color .15s;}
.mnav-item.active{color:#7c3aed;}
.mnav-item svg{width:20px;height:20px;}
#more-drawer{display:none;position:fixed;bottom:60px;left:0;right:0;background:#fff;border-top:1px solid #e5e7eb;z-index:99;padding:6px 0;}
#more-drawer.open{display:block;}
.drawer-row{display:flex;align-items:center;gap:12px;padding:11px 20px;font-size:14px;color:#374151;cursor:pointer;}
.drawer-row svg{width:18px;height:18px;}
#drawer-bg{display:none;position:fixed;inset:0;z-index:98;}
#drawer-bg.open{display:block;}

/* Sidebar links */
.slink{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;font-size:13px;color:#374151;cursor:pointer;transition:background .1s;}
.slink:hover{background:#f9fafb;}
.slink.active{background:#ede9fe;color:#5b21b6;font-weight:600;}
.slink svg{width:15px;height:15px;flex-shrink:0;}
.scat{font-size:10px;font-weight:700;color:#9ca3af;padding:4px 10px;margin:6px 0 2px;letter-spacing:.06em;}

/* Pages */
.page{padding:22px;max-width:640px;margin:0 auto;}
.page.hidden{display:none;}
.pg-title{font-size:19px;font-weight:700;color:#111827;margin-bottom:16px;}

/* Shared components */
.stat-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px;text-align:center;}
.stat-val{font-size:26px;font-weight:700;}
.stat-lbl{font-size:11px;color:#6b7280;margin-top:3px;}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px;}
.badge-avail{background:#d1fae5;color:#065f46;font-size:11px;padding:3px 9px;border-radius:99px;}
.badge-inuse{background:#fee2e2;color:#991b1b;font-size:11px;padding:3px 9px;border-radius:99px;}
.badge-low{background:#fef3c7;color:#92400e;font-size:11px;padding:3px 9px;border-radius:99px;}
.btn{padding:10px 0;border-radius:10px;font-size:14px;font-weight:600;border:none;cursor:pointer;width:100%;}
.btn-primary{background:#7c3aed;color:#fff;}
.btn-primary:hover{background:#6d28d9;}
.btn-success{background:#059669;color:#fff;}
.btn-danger{background:#dc2626;color:#fff;}
.btn-gray{background:#374151;color:#fff;}
.input{width:100%;border:1px solid #d1d5db;border-radius:9px;padding:9px 13px;font-size:14px;outline:none;font-family:inherit;}
.input:focus{border-color:#a78bfa;}
.select{width:100%;border:1px solid #d1d5db;border-radius:9px;padding:9px 13px;font-size:14px;outline:none;background:#fff;font-family:inherit;}
.label{font-size:12px;color:#4b5563;display:block;margin-bottom:5px;}
.form-group{margin-bottom:12px;}
.row-flex{display:flex;align-items:center;gap:10px;}
.tag{font-size:12px;background:#ddd6fe;color:#5b21b6;padding:3px 10px;border-radius:99px;display:inline-flex;align-items:center;gap:4px;}
.img-btn{width:42px;height:42px;border-radius:8px;border:1px solid #e5e7eb;background:#f9fafb;cursor:pointer;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:0;}
.img-btn:disabled{opacity:.32;cursor:default;}
.img-btn img{width:100%;height:100%;object-fit:cover;border-radius:7px;}
.img-btn svg{width:20px;height:20px;color:#9ca3af;}

/* Image popup */
#img-popup{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:400;align-items:center;justify-content:center;}
#img-popup.open{display:flex;}
#img-popup-inner{position:relative;max-width:88vw;max-height:84vh;}
#img-popup-inner img{display:block;max-width:100%;max-height:84vh;border-radius:12px;}
#img-popup-close{position:absolute;top:-14px;right:-14px;width:32px;height:32px;border-radius:50%;background:#fff;border:none;cursor:pointer;font-size:16px;color:#374151;display:flex;align-items:center;justify-content:center;}

/* Admin tabs */
.atab{padding:7px 15px;font-size:13px;font-weight:600;border:none;background:none;cursor:pointer;color:#6b7280;border-bottom:2px solid transparent;}
.atab.active{color:#7c3aed;border-bottom-color:#7c3aed;}

/* Notification toast */
#toast{display:none;position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;font-size:13px;padding:10px 18px;border-radius:10px;z-index:500;white-space:nowrap;pointer-events:none;}
</style>
</head>
<body>

<!-- ═══════════════════════════════
     IMAGE POPUP (shared)
════════════════════════════════ -->
<div id="img-popup" onclick="if(event.target===this)closeImg()">
  <div id="img-popup-inner">
    <button id="img-popup-close" onclick="closeImg()">✕</button>
    <img id="img-popup-src" src="" alt=""/>
  </div>
</div>

<!-- ═══════════════════════════════
     TOAST (shared)
════════════════════════════════ -->
<div id="toast"></div>

<!-- ═══════════════════════════════
     PORTAL — App Launcher
════════════════════════════════ -->
<div id="portal">
  <div class="portal-header">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
      <div>
        <h1 style="font-size:20px;font-weight:700;color:#111827;">社内管理プラットフォーム</h1>
        <p style="font-size:13px;color:#6b7280;margin-top:2px;">アプリを選択してください</p>
      </div>
      <div style="text-align:right;">
        <div id="portal-user" style="font-size:12px;color:#9ca3af;">未ログイン</div>
      </div>
    </div>
  </div>
  <div class="portal-grid" id="app-grid">
    <!-- Rendered by JS from APPS registry -->
  </div>
  <div style="padding:0 24px 32px;max-width:760px;margin:0 auto;">
    <p style="font-size:11px;color:#9ca3af;text-align:center;">© 社内システム · <span id="portal-date"></span></p>
  </div>
</div>

<!-- ═══════════════════════════════
     APP SHELL — wraps every app
════════════════════════════════ -->
<div id="app-shell">
  <!-- Top bar -->
  <div class="app-topbar">
    <button class="app-topbar-back" onclick="backToPortal()" title="ポータルに戻る">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </button>
    <span class="app-topbar-title" id="app-topbar-title">—</span>
    <span class="app-topbar-user" id="app-topbar-user"></span>
    <button id="logout-topbar-btn" style="display:none;font-size:12px;color:#ef4444;background:none;border:1px solid #fecaca;border-radius:6px;padding:3px 10px;cursor:pointer;" onclick="appLogout()">ログアウト</button>
  </div>

  <!-- Content area: sidebar + main -->
  <div class="app-content">
    <div class="app-layout" id="app-layout">
      <!-- Sidebar (desktop) -->
      <nav class="app-sidebar" id="app-sidebar">
        <div style="padding:10px 8px;flex:1;display:flex;flex-direction:column;gap:1px;" id="sidebar-nav-content"></div>
        <div style="padding:10px 14px;border-top:1px solid #f3f4f6;font-size:11px;color:#9ca3af;" id="sidebar-footer-content"></div>
      </nav>
      <!-- Pages mount point -->
      <div class="app-main" id="app-main-area">
        <!-- Pages injected here by app module -->
      </div>
    </div>
  </div>

  <!-- Mobile bottom nav -->
  <nav id="mobile-nav"></nav>
  <div id="drawer-bg" onclick="closeDrawer()"></div>
  <div id="more-drawer" id="more-drawer"></div>
</div>

<!-- ══════════════════════════════════════════════════════
     JAVASCRIPT — Shell + App Registry + App Modules
═══════════════════════════════════════════════════════ -->
<script>
/* ════════════════════════════════════════
   SHARED SERVICES
════════════════════════════════════════ */
let _token = localStorage.getItem("plt_token") || null;
let _isAdmin = localStorage.getItem("plt_is_admin") === "true";
let _username = localStorage.getItem("plt_username") || null;
let _currentApp = null;
let _scanners = [];

function apiBase(appId) {
  const app = APPS.find(a => a.id === appId);
  return app ? app.apiUrl : "";
}

async function api(appId, path, opts = {}) {
  const base = apiBase(appId);
  const h = {"Content-Type": "application/json"};
  if (_token) h["Authorization"] = `Bearer ${_token}`;
  const r = await fetch(base + path, {...opts, headers: {...h, ...(opts.headers||{})}});
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

function esc(s) {
  if (s == null) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function toast(msg, ms = 2200) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.display = "none", ms);
}

function openImg(url) {
  document.getElementById("img-popup-src").src = url;
  document.getElementById("img-popup").classList.add("open");
}
function closeImg() { document.getElementById("img-popup").classList.remove("open"); }

function imgBtn(url) {
  if (url) return `<button class="img-btn" onclick="event.stopPropagation();openImg('${esc(url)}')" title="画像"><img src="${esc(url)}" onerror="this.parentElement.disabled=true;this.parentElement.style.opacity='.3'"/></button>`;
  return `<button class="img-btn" disabled title="画像なし"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg></button>`;
}

function parseQR(raw) {
  const d = (raw || "").trim();
  if (/^\d+$/.test(d)) return {type:"jig", id:parseInt(d)};
  const hi = d.indexOf("#");
  if (hi !== -1) {
    const after = d.slice(hi+1), qi = after.indexOf("?");
    if (qi !== -1) {
      const p = new URLSearchParams(after.slice(qi+1));
      if (p.get("session")) return {type:"session", token:p.get("session")};
      if (p.get("jig"))     return {type:"jig", id:parseInt(p.get("jig"))};
    }
  }
  try {
    const u = new URL(d);
    if (u.searchParams.get("session")) return {type:"session", token:u.searchParams.get("session")};
    if (u.searchParams.get("jig"))     return {type:"jig", id:parseInt(u.searchParams.get("jig"))};
  } catch(_) {}
  if (d.length > 10 && !d.includes(" ")) return {type:"session", token:d};
  return null;
}

function stopScanners() {
  _scanners.forEach(s => s && s.stop && s.stop().catch(()=>{}));
  _scanners = [];
}

function closeDrawer() {
  document.getElementById("more-drawer").classList.remove("open");
  document.getElementById("drawer-bg").classList.remove("open");
}

function setAuthUI(username) {
  document.getElementById("app-topbar-user").textContent = username || "";
  document.getElementById("logout-topbar-btn").style.display = username ? "" : "none";
  document.getElementById("portal-user").textContent = username || "未ログイン";
}

function appLogout() {
  _token = null; _isAdmin = false; _username = null;
  localStorage.removeItem("plt_token"); localStorage.removeItem("plt_is_admin"); localStorage.removeItem("plt_username");
  setAuthUI(null);
  if (_currentApp && _currentApp.onLogout) _currentApp.onLogout();
}

/* ════════════════════════════════════════
   APP REGISTRY
   To add a new app: push one object here
════════════════════════════════════════ */
const APPS = [
  {
    id: "jig",
    name: "JIG管理システム",
    nameShort: "JIG",
    desc: "貸出・返却・モニター",
    apiUrl: "https://YOUR-JIG-RENDER-URL.onrender.com",  // ← Thay URL
    color: "#7c3aed",
    bgColor: "#ede9fe",
    status: "active",
    icon: `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 10V11m0 0L4 7"/></svg>`,
    mount: mountJIG,
  },
  {
    id: "zaiko",
    name: "在庫管理",
    nameShort: "在庫",
    desc: "在庫・入出庫・アラート",
    apiUrl: "https://YOUR-ZAIKO-RENDER-URL.onrender.com", // ← Thay URL
    color: "#0f766e",
    bgColor: "#ccfbf1",
    status: "active",
    icon: `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/></svg>`,
    mount: mountZaiko,
  },
  /* ── ADD NEW APP HERE ──
  {
    id: "xxx",
    name: "新しいApp",
    nameShort: "XXX",
    desc: "説明テキスト",
    apiUrl: "https://...",
    color: "#1d4ed8",
    bgColor: "#dbeafe",
    status: "active",
    icon: `<svg .../>`,
    mount: mountXxx,
  },
  */
];

/* ════════════════════════════════════════
   PORTAL SHELL
════════════════════════════════════════ */
function renderPortal() {
  document.getElementById("portal-date").textContent = new Date().toLocaleDateString("ja-JP");
  setAuthUI(_username);
  const grid = document.getElementById("app-grid");
  grid.innerHTML = APPS.map(app => `
    <div class="app-card" onclick="launchApp('${app.id}')">
      <div class="app-icon" style="background:${app.bgColor};color:${app.color};">${app.icon}</div>
      <div>
        <div class="app-name">${esc(app.name)}</div>
        <div class="app-desc" style="margin-top:3px;">${esc(app.desc)}</div>
      </div>
      <span class="app-badge" style="background:${app.bgColor};color:${app.color};">${app.status === "active" ? "利用可" : "準備中"}</span>
    </div>
  `).join("");
}

function launchApp(appId) {
  const app = APPS.find(a => a.id === appId);
  if (!app) return;
  _currentApp = app;
  document.getElementById("portal").style.display = "none";
  document.getElementById("app-shell").style.display = "flex";
  document.getElementById("app-topbar-title").textContent = app.name;
  setAuthUI(_username);
  document.getElementById("more-drawer").innerHTML = "";
  document.getElementById("mobile-nav").innerHTML = "";
  document.getElementById("sidebar-nav-content").innerHTML = "";
  document.getElementById("app-main-area").innerHTML = "";
  stopScanners();
  app.mount(app);
}

function backToPortal() {
  stopScanners();
  _currentApp = null;
  document.getElementById("app-shell").style.display = "none";
  document.getElementById("portal").style.display = "block";
  document.getElementById("more-drawer").classList.remove("open");
  document.getElementById("drawer-bg").classList.remove("open");
}

/* ════════════════════════════════════════
   SHELL NAV BUILDER
   Each app calls buildNav() with its config
════════════════════════════════════════ */
function buildNav(appColor, groups, mobileMain, moreItems) {
  /* Desktop sidebar */
  const sideEl = document.getElementById("sidebar-nav-content");
  sideEl.innerHTML = groups.map(g => `
    <div class="scat">${esc(g.label)}</div>
    ${g.items.map(item => `
      <a class="slink" id="slink-${item.id}" onclick="navGo('${item.id}')">
        ${item.icon} ${esc(item.name)}
      </a>`).join("")}
  `).join("");

  /* Mobile bottom nav — main tabs */
  const mnav = document.getElementById("mobile-nav");
  mnav.innerHTML = mobileMain.map(item => `
    <button class="mnav-item" id="mnav-${item.id}" onclick="${item.more ? 'toggleDrawer()' : `navGo('${item.id}')`}">
      ${item.icon}<span>${esc(item.name)}</span>
    </button>`).join("");

  /* More drawer */
  const drawer = document.getElementById("more-drawer");
  drawer.innerHTML = (moreItems || []).map(item => `
    <div class="drawer-row" onclick="navGo('${item.id}');closeDrawer()">
      ${item.icon} ${esc(item.name)}
    </div>`).join("") +
    `<div style="padding:8px 20px;border-top:1px solid #f3f4f6;margin-top:4px;display:flex;align-items:center;gap:8px;">
      <span style="font-size:12px;color:#9ca3af;flex:1;" id="drawer-user">${esc(_username || "未ログイン")}</span>
      ${_username ? `<button onclick="appLogout();closeDrawer()" style="font-size:12px;color:#ef4444;background:none;border:none;cursor:pointer;">ログアウト</button>` : ""}
    </div>`;
}

let _navGoFn = null;
function navGo(pageId) {
  closeDrawer();
  if (_navGoFn) _navGoFn(pageId);
}
function toggleDrawer() {
  document.getElementById("more-drawer").classList.toggle("open");
  document.getElementById("drawer-bg").classList.toggle("open");
}
function setActiveNav(pageId) {
  document.querySelectorAll(".slink").forEach(el => el.classList.remove("active"));
  document.querySelectorAll(".mnav-item").forEach(el => el.classList.remove("active"));
  const sl = document.getElementById("slink-" + pageId);
  if (sl) sl.classList.add("active");
  const mn = document.getElementById("mnav-" + pageId);
  if (mn) mn.classList.add("active");
}

/* ════════════════════════════════════════════════════════
   APP MODULE: JIG管理システム
   Full feature set from previous version
════════════════════════════════════════════════════════ */
function mountJIG(app) {
  const AID = app.id;

  /* Nav config */
  const IC = {
    home:`<svg class="slink" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:15px;height:15px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>`,
    borrow:`<svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:15px;height:15px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>`,
    ret:`<svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:15px;height:15px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/></svg>`,
    list:`<svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:15px;height:15px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>`,

  /* State */
  let jBorrowQueue = [], jSessionToken = "", jMode = "scan";

  /* Router */
  function jGo(page) {
    stopScanners();
    document.querySelectorAll("#app-main-area .page").forEach(p => p.classList.add("hidden"));
    const pg = document.getElementById("p-" + page);
    if (pg) pg.classList.remove("hidden");
    setActiveNav(page);
    if (page === "home")     jLoadHome();
    if (page === "jig-list") jLoadJigList();
    if (page === "log")      jLoadLog();
    if (page === "comment")  jLoadComment();
    if (page === "admin")    jLoadAdmin();
    if (page === "borrow")   { jBorrowQueue=[]; jUpdateQueue(); document.getElementById("j-borrow-result").style.display="none"; jSetMode("scan"); }
    if (page === "return")   { document.getElementById("j-ret-session").style.display="none"; document.getElementById("j-ret-result").style.display="none"; jStartReturnScan(); }
  }
  _navGoFn = jGo;
  app.onLogout = () => { document.getElementById("j-adm-panel").style.display="none"; document.getElementById("j-adm-login").style.display=""; };

  /* Helpers */
  function j(id){ return document.getElementById(id); }

  async function jLoadHome() {
    try { const s=await api(AID,"/jigs/stats"); j("j-total").textContent=s.total; j("j-inuse").textContent=s.in_use; j("j-avail").textContent=s.available; } catch(_){}
    try {
      const c=await api(AID,"/comments/");
      j("j-info").innerHTML=c.slice(0,8).map(x=>{
        const jl=x.jig?` / ${esc(x.jig.name)}${x.jig.description?` (${esc(x.jig.description)})`:""}`:""
        return `<div class="card"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px;"><span style="font-weight:600;">${esc(x.author_name)}<span style="font-weight:400;color:#6b7280;">${jl}</span></span><span style="color:#9ca3af;">${new Date(x.created_at).toLocaleDateString("ja-JP")}</span></div><p style="font-size:13px;color:#374151;">${esc(x.content)}</p></div>`;
      }).join("");
    } catch(_){}
  }

  function jSetMode(mode) {
    jMode=mode; stopScanners();
    j("j-scan-area").style.display   = mode==="scan"?"":"none";
    j("j-manual-area").style.display = mode==="manual"?"":"none";
    const bS=j("j-btn-scan"), bM=j("j-btn-manual");
    if(mode==="scan"){ bS.style.cssText+="border-color:#7c3aed;background:#ede9fe;color:#5b21b6;"; bM.style.cssText+="border-color:#e5e7eb;background:#fff;color:#374151;"; jStartBorrowScan(); }
    else { bM.style.cssText+="border-color:#7c3aed;background:#ede9fe;color:#5b21b6;"; bS.style.cssText+="border-color:#e5e7eb;background:#fff;color:#374151;"; jLoadManual(); }
  }

  function jStartBorrowScan() {
    const sc = new Html5Qrcode("j-qr-reader");
    _scanners.push(sc);
    sc.start({facingMode:"environment"},{fps:10,qrbox:{width:200,height:200}},
      decoded=>{
        const p=parseQR(decoded);
        if(!p){j("j-scan-msg").textContent="QR認識不可";return;}
        if(p.type==="session"){ stopScanners(); j("j-session-input").value=p.token; jGo("return"); return; }
        if(jBorrowQueue.find(x=>x.id===p.id)){j("j-scan-msg").textContent=`JIG #${p.id} は追加済み`;return;}
        jAddQueue(p.id,null);
      },()=>{}
    ).catch(e=>j("j-scan-msg").textContent="カメラ起動失敗");
  }

  async function jAddQueue(id,hint) {
    if(jBorrowQueue.find(x=>x.id===id))return;
    let name=hint||`JIG #${id}`;
    try{const jig=await api(AID,`/jigs/${id}`); if(!jig||jig.status!=="available"){j("j-scan-msg").textContent=`${jig?jig.name:"JIG"} は使用中`;return;} name=jig.name;}catch(_){}
    jBorrowQueue.push({id,name}); j("j-scan-msg").textContent=`✓ ${name} 追加 (${jBorrowQueue.length}件)`; jUpdateQueue();
  }

  async function jLoadManual() {
    try{
      const jigs=await api(AID,"/jigs/");
      jigs.sort((a,b)=>a.name.localeCompare(b.name,"ja"));
      j("j-jig-cards").innerHTML=jigs.map(jig=>`
        <div id="j-card-${jig.id}" onclick="jToggleJig(${jig.id},'${esc(jig.name)}',this)"
          style="background:#fff;border:2px solid #e5e7eb;border-radius:10px;padding:10px;display:flex;align-items:center;gap:9px;cursor:pointer;">
          ${imgBtn(jig.image_url)}
          <div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(jig.name)}</div><div style="font-size:11px;color:#6b7280;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(jig.description)}</div></div>
          <span class="${jig.status==="available"?"badge-avail":"badge-inuse"}">${jig.status==="available"?"空き":"使用中"}</span>
        </div>`).join("");
    }catch(_){}
  }

  window.jToggleJig = function(id,name,el){
    const idx=jBorrowQueue.findIndex(x=>x.id===id);
    if(idx!==-1){jBorrowQueue.splice(idx,1);el.style.borderColor="#e5e7eb";el.style.background="#fff";}
    else{jBorrowQueue.push({id,name});el.style.borderColor="#7c3aed";el.style.background="#f5f3ff";}
    jUpdateQueue();
  };

  function jUpdateQueue(){
    const box=j("j-queue-box"); if(!box)return;
    if(jBorrowQueue.length===0){box.style.display="none";return;}
    box.style.display="";
    j("j-queue-tags").innerHTML=jBorrowQueue.map(it=>`<span class="tag">${esc(it.name)}<span onclick="jRemoveQueue(${it.id})" style="cursor:pointer;opacity:.7;">×</span></span>`).join("");
  }
  window.jRemoveQueue = function(id){ jBorrowQueue=jBorrowQueue.filter(x=>x.id!==id); const c=j("j-card-"+id); if(c){c.style.borderColor="#e5e7eb";c.style.background="#fff";} jUpdateQueue(); };

  window.jConfirmBorrow = async function(){
    const name=j("j-borrower").value.trim();
    if(!name){alert("名前を入力");return;} if(!jBorrowQueue.length){alert("JIGを選択");return;}
    try{
      const res=await api(AID,"/borrow/",{method:"POST",body:JSON.stringify({borrower_name:name,jig_ids:jBorrowQueue.map(x=>x.id)})});
      j("j-borrow-result").style.display=""; j("j-session-qr").src=res.session_qr_url; j("j-dl-qr").href=res.session_qr_url;
      jBorrowQueue=[]; jUpdateQueue(); stopScanners(); toast("借出完了");
    }catch(e){alert("エラー: "+e.message);}
  };

  function jStartReturnScan(){
    const sc=new Html5Qrcode("j-qr-reader-ret"); _scanners.push(sc);
    sc.start({facingMode:"environment"},{fps:10,qrbox:{width:200,height:200}},
      decoded=>{const p=parseQR(decoded); if(!p||p.type!=="session")return; j("j-session-input").value=p.token; stopScanners(); jLoadSession();},
      ()=>{}
    ).catch(()=>{});
  }

  window.jLoadSession = async function(){
    const t=j("j-session-input").value.trim(); if(!t)return; jSessionToken=t;
    try{
      const s=await api(AID,`/return/${t}`);
      j("j-ret-session").style.display=""; j("j-ret-result").style.display="none";
      j("j-ret-list").innerHTML=s.jigs.map(jig=>`
        <label style="display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #e5e7eb;border-radius:9px;padding:10px;cursor:pointer;">
          <input type="checkbox" class="j-ret-chk" value="${jig.id}" checked style="width:16px;height:16px;accent-color:#7c3aed;flex-shrink:0;"/>
          ${imgBtn(jig.image_url)}
          <div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:600;">${esc(jig.name)}</div><div style="font-size:11px;color:#6b7280;">${esc(jig.description)}</div></div>
        </label>`).join("");
    }catch(e){alert("Session見つかりません: "+e.message);}
  };

  window.jSubmitReturn = async function(all){
    const ids=all?null:Array.from(document.querySelectorAll(".j-ret-chk:checked")).map(c=>parseInt(c.value));
    try{
      const res=await api(AID,"/return/",{method:"POST",body:JSON.stringify({session_token:jSessionToken,jig_ids:ids})});
      j("j-ret-result").style.display=""; toast("返却完了");
      if(res.new_session_qr_url){j("j-new-qr-wrap").style.display="";j("j-new-qr").src=res.new_session_qr_url;}
    }catch(e){alert("エラー: "+e.message);}
  };

  async function jLoadJigList(){
    try{
      const jigs=await api(AID,"/jigs/"); jigs.sort((a,b)=>a.name.localeCompare(b.name,"ja"));
      j("j-list").innerHTML=jigs.map(jig=>`
        <div class="card" style="display:flex;align-items:center;gap:10px;">

        <div style="display:flex;align-items:center;gap:10px;">
          <div style="flex:1;"><div style="font-size:13px;font-weight:600;">${esc(x.name)}</div><div style="font-size:11px;color:#6b7280;">${esc(x.category)} · ${esc(x.location)}</div></div>
          <div style="text-align:right;"><div style="font-size:16px;font-weight:700;color:#ef4444;">${x.stock}<span style="font-size:11px;color:#9ca3af;"> ${esc(x.unit)}</span></div><div style="font-size:10px;color:#9ca3af;">最低: ${x.minStock} ${esc(x.unit)}</div></div>
        </div>
      </div>`).join("")}
  </div>`}
</div>

<div id="p-z-admin" class="page hidden"><h2 class="pg-title">在庫管理 Admin</h2>
  <div class="card" style="background:#f0fdf4;border-color:#bbf7d0;">
    <p style="font-size:13px;font-weight:600;color:#065f46;margin-bottom:6px;">在庫管理バックエンド</p>
    <p style="font-size:12px;color:#374151;line-height:1.6;">この画面はデモ表示です。実際のバックエンド（FastAPI + PostgreSQL）をRenderにデプロイし、<code style="background:#e5e7eb;padding:1px 5px;border-radius:4px;">APPS</code>の<code style="background:#e5e7eb;padding:1px 5px;border-radius:4px;">apiUrl</code>に設定してください。</p>
    <p style="font-size:12px;color:#374151;line-height:1.6;margin-top:8px;">バックエンドのAPIエンドポイント例：<br><code style="background:#e5e7eb;padding:1px 5px;border-radius:4px;">GET /items/ · POST /transactions/ · GET /alerts/</code></p>
  </div>
</div>
  `;

  let zTxnType = "in";
  window.zSetTxnType = function(t){
    zTxnType=t;
    const bI=document.getElementById("z-txn-in"), bO=document.getElementById("z-txn-out");
    if(t==="in"){bI.style.cssText+="border-color:#059669;background:#f0fdf4;color:#065f46;"; bO.style.cssText+="border-color:#e5e7eb;background:#fff;color:#374151;";}
    else{bO.style.cssText+="border-color:#dc2626;background:#fff1f2;color:#991b1b;"; bI.style.cssText+="border-color:#e5e7eb;background:#fff;color:#374151;";}
  };
  window.zFilterItems = function(){
    const q=document.getElementById("z-search").value.toLowerCase();
    document.querySelectorAll(".z-item-card").forEach(el=>{
      el.style.display=(el.dataset.name.includes(q)||el.dataset.cat.includes(q))?"":"none";
    });
  };
  window.zSubmitTxn = function(){
    const user=document.getElementById("z-txn-user").value.trim();
    const qty=parseInt(document.getElementById("z-txn-qty").value);
    if(!user||!qty){alert("担当者と数量を入力");return;}
    toast(`${zTxnType==="in"?"入庫":"出庫"}記録しました（デモ）`);
  };

  function zGo(page) {
    document.querySelectorAll("#app-main-area .page").forEach(p=>p.classList.add("hidden"));
    const pg=document.getElementById("p-"+page); if(pg) pg.classList.remove("hidden");
    setActiveNav(page);
  }
  _navGoFn = zGo;
  app.onLogout = () => {};
  zGo("z-home");
}
